name: Enforce main branch source rules

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure only dev branch merges into main
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "Error: only the 'dev' branch can be merged into main. Got: ${{ github.head_ref }}"
            exit 1
          fi
          echo "dev -> main merge approved"
